<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투자 현황 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            background: #f9f9f9;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-button:hover {
            background: #f0f0f0;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        /* 날짜 범위 선택기 */
        .date-range-filter {
            background: #f5f7fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: flex-end;
        }

        .date-range-filter label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .date-range-filter input[type="date"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .date-range-filter input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .date-range-filter button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .date-range-filter button:hover {
            background: #764ba2;
        }

        .date-range-filter button:active {
            transform: scale(0.98);
        }

        .reset-btn {
            background: #999 !important;
        }

        .reset-btn:hover {
            background: #777 !important;
        }

        /* 대시보드 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card.alt {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .card.alt2 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .card.alt3 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .card-label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 700;
        }

        .card-subtitle {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 8px;
        }

        /* 차트 */
        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        /* 입력 폼 */
        .input-form {
            background: #f5f7fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            width: 100%;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        /* 데이터 표 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .data-table thead {
            background: #f5f7fa;
        }

        .data-table th {
            padding: 12px 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }

        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table tbody tr:hover {
            background: #f9f9f9;
        }

        /* 정보 박스 */
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }

        .date-range-info {
            background: #f3e5f5;
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 12px;
            color: #512da8;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .date-range-filter {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab-button {
                flex: 1 1 50%;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 투자 현황 관리</h1>
            <p>포트폴리오 성과를 한눈에 파악하세요</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('dashboard')">대시보드</button>
            <button class="tab-button" onclick="switchTab('input')">데이터 입력</button>
            <button class="tab-button" onclick="switchTab('records')">기록</button>
            <button class="tab-button" onclick="switchTab('charts')">차트</button>
        </div>

        <!-- 대시보드 탭 -->
        <div id="dashboard" class="tab-content active">
            <div class="date-range-filter">
                <div>
                    <label for="startDate">시작일</label>
                    <input type="date" id="startDate">
                </div>
                <div>
                    <label for="endDate">종료일</label>
                    <input type="date" id="endDate">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="applyDateFilter()">조회</button>
                    <button class="reset-btn" onclick="resetDateFilter()">초기화</button>
                </div>
            </div>

            <div id="dateRangeInfo" class="date-range-info" style="display: none;"></div>

            <div class="dashboard">
                <div class="card">
                    <div class="card-label">총 투입금</div>
                    <div class="card-value" id="totalInvested">₩0</div>
                    <div class="card-subtitle">누적 투자액</div>
                </div>
                <div class="card alt">
                    <div class="card-label">현재 평가금</div>
                    <div class="card-value" id="currentValue">₩0</div>
                    <div class="card-subtitle">포트폴리오 가치</div>
                </div>
                <div class="card alt2">
                    <div class="card-label">평가 손익</div>
                    <div class="card-value" id="gainLoss">₩0</div>
                    <div class="card-subtitle" id="gainLossPercent">+0.00%</div>
                </div>
                <div class="card alt3">
                    <div class="card-label">수익률</div>
                    <div class="card-value" id="returnRate">0.00%</div>
                    <div class="card-subtitle">누적 수익률</div>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-title">📊 자산 비중 현황</div>
                <canvas id="portfolioChart"></canvas>
            </div>

            <div class="chart-container">
                <div class="chart-title">📈 평가금액 추이</div>
                <canvas id="valueChart"></canvas>
            </div>
        </div>

        <!-- 데이터 입력 탭 -->
        <div id="input" class="tab-content">
            <div class="input-form">
                <h2 style="margin-bottom: 20px;">새 데이터 입력</h2>
                <div class="form-group">
                    <label>날짜</label>
                    <input type="date" id="inputDate">
                </div>
                <div class="form-group">
                    <label>항목</label>
                    <select id="inputCategory">
                        <option value="">선택하세요</option>
                        <option value="연금저축">연금저축</option>
                        <option value="ISA">ISA</option>
                        <option value="IRP">IRP</option>
                        <option value="연금 소계">연금 소계</option>
                        <option value="김시온">김시온</option>
                        <option value="김로아">김로아</option>
                        <option value="펀드">펀드</option>
                        <option value="주식">주식</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>투입금액 (원)</label>
                        <input type="number" id="inputAmount" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>평가금액 (원)</label>
                        <input type="number" id="inputValue" placeholder="0">
                    </div>
                </div>
                <button class="btn-primary" onclick="saveData()">저장</button>
            </div>

            <div style="background: #f5f7fa; padding: 20px; border-radius: 8px; margin-top: 25px;">
                <h3 style="margin-bottom: 15px;">📥 데이터 관리</h3>
                <button class="btn-primary" onclick="exportData()" style="background: #43e97b; margin-bottom: 10px;">📥 데이터 내보내기 (JSON)</button>
                <button class="btn-primary" onclick="document.getElementById('importFile').click()" style="background: #4facfe;">📤 데이터 불러오기 (JSON)</button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
            </div>
        </div>

        <!-- 기록 탭 -->
        <div id="records" class="tab-content">
            <div class="info-box">
                💡 모든 기록 데이터가 브라우저 로컬스토리지에 저장됩니다
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>항목</th>
                        <th>투입금액</th>
                        <th>평가금액</th>
                        <th>손익</th>
                        <th>삭제</th>
                    </tr>
                </thead>
                <tbody id="recordsTable">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #999;">
                            데이터가 없습니다. 데이터 입력 탭에서 추가하세요.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 차트 탭 -->
        <div id="charts" class="tab-content">
            <div class="chart-container">
                <div class="chart-title">수익률 추이 (%)</div>
                <canvas id="returnChart"></canvas>
            </div>

            <div class="chart-container">
                <div class="chart-title">항목별 투입금액 비교</div>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
    </div>

        // ====== 날짜 설정 ======
        function setDefaultDates() {
            const today = new Date();
            const oneYearAgo = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
            
            document.getElementById('startDate').valueAsDate = oneYearAgo;
            document.getElementById('endDate').valueAsDate = today;
        }

        // ====== 날짜 필터 적용 ======
        function applyDateFilter() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                alert('시작일과 종료일을 모두 선택하세요.');
                return;
            }

            dateFilter.start = new Date(startDate);
            dateFilter.end = new Date(endDate);

            // 종료일에 하루 더하기 (종료일 포함)
            dateFilter.end.setDate(dateFilter.end.getDate() + 1);

            filterDataByDate();
            showDateRangeInfo();
            updateAllDisplays();
        }

        // ====== 날짜 필터 초기화 ======
        function resetDateFilter() {
            dateFilter = { start: null, end: null };
            filteredData = [...allData];
            document.getElementById('dateRangeInfo').style.display = 'none';
            setDefaultDates();
            applyDateFilter();
        }

        // ====== 데이터 날짜별 필터링 ======
        function filterDataByDate() {
            if (!dateFilter.start || !dateFilter.end) {
                filteredData = [...allData];
                return;
            }

            filteredData = allData.filter(item => {
                const itemDate = new Date(item.date);
                return itemDate >= dateFilter.start && itemDate < dateFilter.end;
            });
        }

        // ====== 날짜 범위 정보 표시 ======
        function showDateRangeInfo() {
            const infoBox = document.getElementById('dateRangeInfo');
            const startStr = dateFilter.start.toLocaleDateString('ko-KR');
            const endStr = new Date(dateFilter.end.getTime() - 86400000).toLocaleDateString('ko-KR');
            infoBox.textContent = `📅 조회 기간: ${startStr} ~ ${endStr} (${filteredData.length}개 항목)`;
            infoBox.style.display = 'block';
        }

        // ====== 탭 전환 ======
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // 차트 업데이트
            setTimeout(() => {
                if (tabName === 'charts') {
                    updateReturnChart();
                    updateCategoryChart();
                }
            }, 100);
        }

        // ====== 데이터 저장 ======
        function saveData() {
            const date = document.getElementById('inputDate').value;
            const category = document.getElementById('inputCategory').value;
            const amount = parseInt(document.getElementById('inputAmount').value) || 0;
            const value = parseInt(document.getElementById('inputValue').value) || 0;

            if (!date || !category) {
                alert('날짜와 항목을 선택하세요.');
                return;
            }

            const newEntry = { date, category, amount, value, id: Date.now() };
            allData.push(newEntry);
            allData.sort((a, b) => new Date(a.date) - new Date(b.date));

            saveToLocalStorage();
            filterDataByDate();
            updateAllDisplays();

            // 폼 초기화
            document.getElementById('inputDate').value = '';
            document.getElementById('inputCategory').value = '';
            document.getElementById('inputAmount').value = '';
            document.getElementById('inputValue').value = '';

            alert('데이터가 저장되었습니다!');
        }

        // ====== 모든 표시 업데이트 ======
        function updateAllDisplays() {
            updateDashboard();
            updateRecordsTable();
            updateCharts();
        }

        // ====== 대시보드 업데이트 ======
        function updateDashboard() {
            if (filteredData.length === 0) {
                document.getElementById('totalInvested').textContent = '₩0';
                document.getElementById('currentValue').textContent = '₩0';
                document.getElementById('gainLoss').textContent = '₩0';
                document.getElementById('gainLossPercent').textContent = '0.00%';
                document.getElementById('returnRate').textContent = '0.00%';
                return;
            }

            const totalInvested = filteredData.reduce((sum, item) => sum + item.amount, 0);
            const currentValue = filteredData.reduce((sum, item) => sum + item.value, 0);
            const gainLoss = currentValue - totalInvested;
            const returnRate = totalInvested > 0 ? (gainLoss / totalInvested * 100) : 0;

            document.getElementById('totalInvested').textContent = formatCurrency(totalInvested);
            document.getElementById('currentValue').textContent = formatCurrency(currentValue);
            document.getElementById('gainLoss').textContent = formatCurrency(gainLoss);
            document.getElementById('gainLossPercent').textContent = (gainLoss >= 0 ? '+' : '') + gainLoss.toLocaleString() + '원';
            document.getElementById('returnRate').textContent = (returnRate >= 0 ? '+' : '') + returnRate.toFixed(2) + '%';

            updatePortfolioChart();
            updateValueChart();
        }

        // ====== 기록 테이블 업데이트 ======
        function updateRecordsTable() {
            const tbody = document.getElementById('recordsTable');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">조회된 데이터가 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = filteredData.map(item => `
                <tr>
                    <td>${new Date(item.date).toLocaleDateString('ko-KR')}</td>
                    <td>${item.category}</td>
                    <td>${formatCurrency(item.amount)}</td>
                    <td>${formatCurrency(item.value)}</td>
                    <td style="color: ${item.value - item.amount >= 0 ? '#43e97b' : '#f5576c'}; font-weight: 600;">
                        ${(item.value - item.amount >= 0 ? '+' : '')}${formatCurrency(item.value - item.amount)}
                    </td>
                    <td><button onclick="deleteData(${item.id})" style="background: #f5576c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">삭제</button></td>
                </tr>
            `).join('');
        }

        // ====== 포트폴리오 원형 차트 ======
        function updatePortfolioChart() {
            const ctx = document.getElementById('portfolioChart').getContext('2d');
            const categories = [...new Set(filteredData.map(item => item.category))];
            const categoryTotals = categories.map(cat => 
                filteredData.filter(item => item.category === cat).reduce((sum, item) => sum + item.value, 0)
            );

            if (window.portfolioChart instanceof Chart) {
                window.portfolioChart.destroy();
            }

            window.portfolioChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categories,
                    datasets: [{
                        data: categoryTotals,
                        backgroundColor: ['#667eea', '#f5576c', '#43e97b', '#4facfe', '#f093fb']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right'
                        }
                    }
                }
            });
        }

        // ====== 평가금액 추이 차트 ======
        function updateValueChart() {
            const ctx = document.getElementById('valueChart').getContext('2d');
            const dates = [...new Set(filteredData.map(item => item.date))].sort();
            const values = dates.map(date => 
                filteredData.filter(item => item.date <= date).reduce((sum, item) => sum + item.value, 0)
            );

            if (window.valueChart instanceof Chart) {
                window.valueChart.destroy();
            }

            window.valueChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => new Date(d).toLocaleDateString('ko-KR')),
                    datasets: [{
                        label: '평가금액',
                        data: values,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // ====== 수익률 추이 차트 ======
        function updateReturnChart() {
            const ctx = document.getElementById('returnChart').getContext('2d');
            const dates = [...new Set(filteredData.map(item => item.date))].sort();
            const returns = dates.map(date => {
                const itemsUntilDate = filteredData.filter(item => item.date <= date);
                const totalInvested = itemsUntilDate.reduce((sum, item) => sum + item.amount, 0);
                const totalValue = itemsUntilDate.reduce((sum, item) => sum + item.value, 0);
                return totalInvested > 0 ? ((totalValue - totalInvested) / totalInvested * 100) : 0;
            });

            if (window.returnChart instanceof Chart) {
                window.returnChart.destroy();
            }

            window.returnChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => new Date(d).toLocaleDateString('ko-KR')),
                    datasets: [{
                        label: '수익률 (%)',
                        data: returns,
                        borderColor: '#f5576c',
                        backgroundColor: 'rgba(245, 87, 108, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        // ====== 항목별 투입금액 차트 ======
        function updateCategoryChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            const categories = [...new Set(filteredData.map(item => item.category))];
            const categoryAmounts = categories.map(cat => 
                filteredData.filter(item => item.category === cat).reduce((sum, item) => sum + item.amount, 0)
            );

            if (window.categoryChart instanceof Chart) {
                window.categoryChart.destroy();
            }

            window.categoryChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: categories,
                    datasets: [{
                        label: '투입금액',
                        data: categoryAmounts,
                        backgroundColor: ['#667eea', '#f5576c', '#43e97b', '#4facfe', '#f093fb']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // ====== 유틸리티 함수 ======
        function formatCurrency(value) {
            return '₩' + value.toLocaleString();
        }

        function deleteData(id) {
            if (confirm('정말 삭제하시겠습니까?')) {
                allData = allData.filter(item => item.id !== id);
                saveToLocalStorage();
                filterDataByDate();
                updateAllDisplays();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('portfolioData', JSON.stringify(allData));
        }

        function loadData() {
            const saved = localStorage.getItem('portfolioData');
            allData = saved ? JSON.parse(saved) : [];
            filteredData = [...allData];
        }

        function exportData() {
            const dataStr = JSON.stringify(allData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `portfolio_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        // ID 재생성
                        imported.forEach(item => {
                            if (!item.id) item.id = Date.now() + Math.random();
                        });
                        allData = imported;
                        saveToLocalStorage();
                        filterDataByDate();
                        updateAllDisplays();
                        alert('데이터가 불러워졌습니다!');
                    }
                } catch (err) {
                    alert('파일 형식이 올바르지 않습니다.');
                }
            };
            reader.readAsText(file);
        }

        function updateCharts() {
            updatePortfolioChart();
            updateValueChart();
        }

        // 페이지 로드 시 초기화
        window.addEventListener('load', init);
    </script>
</body>
</html>
